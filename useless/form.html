<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Responsive Login Page</title>
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Montserrat', sans-serif;
    }

    body {
        background-color: #2b2b2b;
        background: linear-gradient(to right, #2b2b2b, #303030);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        background-color: #fff;
        border-radius: 30px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.35);
        position: relative;
        overflow: hidden;
        width: 100%;
        max-width: 768px;
        min-height: 480px;
        transition: all 0.3s ease;
    }

    .container p {
        font-size: 14px;
        line-height: 20px;
        letter-spacing: 0.3px;
        margin: 20px 0;
    }

    .container span {
        font-size: 12px;
    }

    .container a {
        color: #333;
        font-size: 13px;
        text-decoration: none;
        margin: 15px 0 10px;
    }

    .container button {
        background-color: #E75925;
        color: #fff;
        font-size: 12px;
        padding: 10px 45px;
        border: 1px solid transparent;
        border-radius: 8px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-top: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .container button:hover {
        background-color: #CD362D;
        transform: translateY(-2px);
    }

    .container button.hidden {
        background-color: transparent;
        border-color: #fff;
    }

    .container button.hidden:hover {
        background-color: rgba(255, 255, 255, 0.1);
    }

    .container form {
        background-color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 0 40px;
        height: 100%;
    }

    .container input {
        background-color: #eee;
        border: none;
        margin: 8px 0;
        padding: 10px 15px;
        font-size: 13px;
        border-radius: 8px;
        width: 100%;
        outline: none;
        transition: all 0.3s ease;
    }

    .container input:focus {
        background-color: #ddd;
        transform: scale(1.02);
    }

    .form-container {
        position: absolute;
        top: 0;
        height: 100%;
        width: 50%;
        transition: all 0.6s ease-in-out;
    }

    .sign-in {
        left: 0;
        z-index: 2;
    }

    .sign-up {
        left: 0;
        opacity: 0;
        z-index: 1;
    }

    /* Desktop/Tablet horizontal layout */
    @media (min-width: 769px) {
        .container.active .sign-in {
            transform: translateX(100%);
        }

        .container.active .sign-up {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: move 0.6s;
        }

        .toggle-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: all 0.6s ease-in-out;
            border-radius: 150px 0 0 100px;
            z-index: 1000;
        }

        .container.active .toggle-container {
            transform: translateX(-100%);
            border-radius: 0 150px 100px 0;
        }
    }

    /* Mobile/Small tablet vertical layout */
    @media (max-width: 768px) {
        body {
            padding: 10px;
        }

        .container {
            min-height: 650px;
            border-radius: 20px;
        }

        .form-container {
            width: 100%;
            height: 70%;
            transition: transform 0.6s ease-in-out, opacity 0.6s ease-in-out;
        }

        .sign-in {
            transform: translateY(0);
        }

        .sign-up {
            transform: translateY(-100%);
        }

        /* Vertical slide animation for mobile */
        .container.active .sign-in {
            transform: translateY(100%);
            opacity: 0;
        }

        .container.active .sign-up {
            transform: translateY(0);
            opacity: 1;
            z-index: 5;
        }

        .toggle-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            overflow: visible;
            transition: all 0.6s ease-in-out;
            border-radius: 30px 30px 0 0;
            z-index: 1000;
        }

        .toggle {
            height: 100%;
            width: 100%;
            left: 0;
            top: 0;
            position: relative;
            transform: none;
        }

        .container.active .toggle {
            transform: none;
        }

        .toggle-panel {
            width: 100%;
            height: 100%;
            padding: 20px;
            position: relative;
            transform: none;
        }

        .toggle-left {
            display: none;
        }

        .container.active .toggle-left {
            display: flex;
            transform: none;
        }

        .container.active .toggle-right {
            display: none;
        }

        .toggle-right {
            display: flex;
            transform: none;
        }

        .container form {
            padding: 20px;
        }

        .container h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .container p {
            font-size: 12px;
            margin: 15px 0;
        }
    }

    /* Extra small mobile devices */
    @media (max-width: 480px) {
        .container {
            min-height: 550px;
            border-radius: 15px;
        }

        .container form {
            padding: 15px;
        }

        .container input {
            padding: 12px 15px;
            font-size: 14px;
        }

        .container button {
            padding: 12px 35px;
            font-size: 13px;
        }

        .toggle-panel {
            padding: 15px;
        }

        .container h1 {
            font-size: 22px;
        }
    }

    @keyframes move {
        0%, 49.99% {
            opacity: 0;
            z-index: 1;
        }
        50%, 100% {
            opacity: 1;
            z-index: 5;
        }
    }

    .social-icons {
        margin: 20px 0;
    }

    .social-icons a {
        border: 1px solid #ccc;
        border-radius: 20%;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        margin: 0 3px;
        width: 40px;
        height: 40px;
        transition: all 0.3s ease;
    }

    .social-icons a:hover {
        background-color: #E75925;
        border-color: #E75925;
        color: white;
        transform: translateY(-2px);
    }

    .toggle {
        background-color: #E75925;
        background: linear-gradient(to right, #CD362D, #E75925);
        color: #fff;
        position: relative;
        left: -100%;
        height: 100%;
        width: 200%;
        transform: translateX(0);
        transition: all 0.6s ease-in-out;
    }

    .container.active .toggle {
        transform: translateX(50%);
    }

    .toggle-panel {
        position: absolute;
        width: 50%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 0 30px;
        text-align: center;
        top: 0;
        transform: translateX(0);
        transition: all 0.6s ease-in-out;
    }

    .toggle-left {
        transform: translateX(-200%);
    }

    .container.active .toggle-left {
        transform: translateX(0);
    }

    .toggle-right {
        right: 0;
        transform: translateX(0);
    }

    .container.active .toggle-right {
        transform: translateX(200%);
    }
</style>

<body>
    <div class="container" id="container">
        <div class="form-container sign-up">
            <form>
                <h1>Create Account</h1>
                <div class="social-icons">
                    <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
                <span>or use your email for registration</span>
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <input type="tel" placeholder="Contact Number" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
        </div>
        <div class="form-container sign-in">
            <form>
                <h1>Sign In</h1>
                <div class="social-icons">
                    <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
                <span>or use your email password</span>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <a href="#">Forget Your Password?</a>
                <button type="submit">Sign In</button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Hello, Welcome!</h1>
                    <p>Enter your personal details to use all of site features</p>
                    <button class="hidden" id="login">Sign In</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello, Friend!</h1>
                    <p>Register with your personal details to use all of site features</p>
                    <button class="hidden" id="register">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const registerBtn = document.getElementById('register');
        const loginBtn = document.getElementById('login');

        registerBtn.addEventListener('click', () => {
            container.classList.add("active");
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove("active");
        });

        // Add smooth scrolling and prevent form submission for demo
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                // Add your form submission logic here
                console.log('Form submitted');
            });
        });

        // Add keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                container.classList.remove("active");
            }
        });
    </script>
</body>

</html>
